name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  XCODE_APP: /Applications/Xcode_26.4.app
  IOS_DESTINATION: platform=iOS Simulator,name=iPhone 17 Pro,OS=latest

jobs:
  packages:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s "$XCODE_APP"
      - name: Test EnhancerCore
        run: swift test --package-path Packages/EnhancerCore
      - name: Test PresetKit
        run: swift test --package-path Packages/PresetKit
      - name: Test HistoryKit
        run: swift test --package-path Packages/HistoryKit
      - name: Test EnhancerUI
        run: swift test --package-path Packages/EnhancerUI

  xcode:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s "$XCODE_APP"
      - name: Install xcodegen
        run: brew install xcodegen
      - name: Generate project
        run: xcodegen generate
      - name: Build app
        run: |
          xcodebuild build \
            -project TalkNative.xcodeproj \
            -scheme TalkNative \
            -destination "$IOS_DESTINATION" \
            CODE_SIGNING_ALLOWED=NO
      - name: Run TalkNativeTests
        run: |
          xcodebuild test \
            -project TalkNative.xcodeproj \
            -scheme TalkNative \
            -destination "$IOS_DESTINATION" \
            -only-testing:TalkNativeTests \
            CODE_SIGNING_ALLOWED=NO
      - name: Run TalkNativeUITests
        run: |
          xcodebuild test \
            -project TalkNative.xcodeproj \
            -scheme TalkNative \
            -destination "$IOS_DESTINATION" \
            -only-testing:TalkNativeUITests \
            CODE_SIGNING_ALLOWED=NO

  lint:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Install swift-format
        run: brew install swift-format
      - name: Lint
        run: ./scripts/lint.sh

  no-network:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: No-network guard
        run: ./scripts/no-network-check.sh
